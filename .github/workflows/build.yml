name: Build Pake App
run-name: "build ${{ inputs.build_id }}"

# This workflow lives in a PUBLIC "builder" repo. The Pake Cloud Builder web app
# triggers it over the REST API and reads back the artifacts:
#   POST /repos/{owner}/{repo}/actions/workflows/build.yml/dispatches
#   body: { "ref": "main", "inputs": { url, name, icon, width, height, platforms, build_id } }
# The matrix runs only the OSes listed in `platforms`. `build_id` is echoed into
# run-name so the caller can correlate the dispatch with its run id.
#
# Every platform drives the `pake-cli` npm package directly rather than the
# tw93/Pake action: one mechanism, one version to pin, and no reliance on action
# tags (Pake publishes only full versions like V3.15.1 — there is no moving v3).
#
# Formats: Linux -> .deb + .rpm + .AppImage   Windows -> .msi   macOS -> .dmg
# On Windows/macOS the CLI's --targets flag selects ARCHITECTURE, not format,
# so it is omitted there and the default (host arch) is used.

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Target URL to package"
        required: true
      name:
        description: "Application name"
        required: true
      description:
        description: "App description read from the target page"
        required: false
        default: ""
      icon:
        description: "Custom icon URL (png/ico/icns)"
        required: false
        default: ""
      width:
        description: "Window width"
        required: false
        default: "1200"
      height:
        description: "Window height"
        required: false
        default: "780"
      platforms:
        description: "Comma list: linux,windows,macos"
        required: false
        default: "linux,windows,macos"
      build_id:
        description: "Correlation id set by the web app"
        required: true

env:
  # Bump to upgrade Pake. Check versions: https://www.npmjs.com/package/pake-cli
  PAKE_VERSION: "3.15.3"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          declare -A R=( [linux]=ubuntu-latest [windows]=windows-latest [macos]=macos-latest )
          inc=""
          IFS=',' read -ra sel <<< "${{ inputs.platforms }}"
          for p in "${sel[@]}"; do
            p=$(echo "$p" | xargs)
            if [ -n "${R[$p]:-}" ]; then
              inc="${inc}{\"os\":\"$p\",\"runner\":\"${R[$p]}\"},"
            fi
          done
          echo "matrix={\"include\":[${inc%,}]}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    # Explicit name so the job is "build (linux)" rather than GitHub's default
    # "build (linux, ubuntu-latest)" — the control plane reads the platform
    # back out of this string to track per-platform progress.
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux is the only platform needing extra system libraries; Windows
      # (MSVC + WebView2) and macOS (Xcode CLT) come ready on their runners.
      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libssl-dev libxdo-dev file rpm

      # For a universal macOS .dmg (Intel + Apple Silicon) instead of the
      # runner-native arm64 build, uncomment this step and add `--targets
      # universal` to the args below. Doubles build time.
      # - name: Add macOS universal targets
      #   if: matrix.os == 'macos'
      #   run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Pake CLI
        shell: bash
        run: npm install -g "pake-cli@${PAKE_VERSION}"

      - name: Build
        shell: bash
        env:
          PAKE_URL: ${{ inputs.url }}
          PAKE_NAME: ${{ inputs.name }}
          PAKE_DESC: ${{ inputs.description }}
          PAKE_ICON: ${{ inputs.icon }}
          PAKE_WIDTH: ${{ inputs.width }}
          PAKE_HEIGHT: ${{ inputs.height }}
          APPIMAGE_EXTRACT_AND_RUN: "1"   # build AppImage without FUSE on the runner
          NO_STRIP: "1"
        run: |
          set -euo pipefail
          mkdir -p dist

          args=(--name "$PAKE_NAME" --width "$PAKE_WIDTH" --height "$PAKE_HEIGHT")
          if [ -n "$PAKE_ICON" ]; then
            args+=(--icon "$PAKE_ICON")
          fi
          # Linux is the only platform where --targets selects FORMATS. The CLI
          # keeps going if one format fails, so .deb/.rpm still ship even if the
          # AppImage step breaks.
          if [ "${{ matrix.os }}" = "linux" ]; then
            args+=(--targets deb,rpm,appimage)
          fi

          pake "$PAKE_URL" "${args[@]}"

          find . -maxdepth 1 -type f \( \
            -iname '*.deb' -o -iname '*.rpm' -o -iname '*.AppImage' \
            -o -iname '*.msi' -o -iname '*.exe' -o -iname '*.dmg' \
          \) -exec mv {} dist/ \;

          echo "Produced:"; ls -la dist/

      # Pake has no --description flag (its config schema sets
      # additionalProperties:false and omits one), so every package inherits
      # Pake's own tagline. Software centres read the .desktop Comment and the
      # deb control Description, so rewrite both here. Linux only, and never
      # fatal: a failed rewrite must not throw away a working installer.
      - name: Apply description to Linux packages
        if: matrix.os == 'linux' && inputs.description != ''
        shell: bash
        env:
          PAKE_DESC: ${{ inputs.description }}
        continue-on-error: true
        run: |
          set -uo pipefail
          shopt -s nullglob
          escaped=$(printf '%s' "$PAKE_DESC" | tr '\n' ' ' | sed 's/[&|]/\\&/g')

          for deb in dist/*.deb; do
            work=$(mktemp -d)
            if ! dpkg-deb -R "$deb" "$work"; then
              echo "::warning::could not unpack $deb, leaving it as built"
              rm -rf "$work"; continue
            fi
            sed -i "s|^Description:.*|Description: ${escaped}|" "$work/DEBIAN/control"
            for desktop in "$work"/usr/share/applications/*.desktop; do
              if grep -q '^Comment=' "$desktop"; then
                sed -i "s|^Comment=.*|Comment=${escaped}|" "$desktop"
              else
                printf 'Comment=%s\n' "$PAKE_DESC" >> "$desktop"
              fi
            done
            dpkg-deb -b "$work" "$deb" >/dev/null && echo "described: $(basename "$deb")"
            rm -rf "$work"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error
          retention-days: 7
