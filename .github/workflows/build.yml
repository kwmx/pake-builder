name: Build Pake App
run-name: "build ${{ inputs.build_id }}"

# This workflow lives in a PUBLIC "builder" repo. The Pake Cloud Builder web app
# triggers it over the REST API and reads back the artifacts:
#   POST /repos/{owner}/{repo}/actions/workflows/build.yml/dispatches
#   body: { "ref": "main", "inputs": { url, name, icon, width, height, platforms, build_id } }
# The matrix runs only the OSes listed in `platforms`. `build_id` is echoed into
# run-name so the caller can correlate the dispatch with its run id.
#
# Every platform drives the `pake-cli` npm package directly rather than the
# tw93/Pake action: one mechanism, one version to pin, and no reliance on action
# tags (Pake publishes only full versions like V3.15.1 — there is no moving v3).
#
# Formats: Linux -> .deb + .rpm + .AppImage   Windows -> .msi   macOS -> .dmg
# On Windows/macOS the CLI's --targets flag selects ARCHITECTURE, not format,
# so it is omitted there and the default (host arch) is used.

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Target URL to package"
        required: true
      name:
        description: "Application name"
        required: true
      description:
        description: "App description read from the target page"
        required: false
        default: ""
      icon:
        description: "Custom icon URL (png/ico/icns)"
        required: false
        default: ""
      width:
        description: "Window width"
        required: false
        default: "1200"
      height:
        description: "Window height"
        required: false
        default: "780"
      platforms:
        description: "Comma list: linux,windows,macos"
        required: false
        default: "linux,windows,macos"
      build_id:
        description: "Correlation id set by the web app"
        required: true

env:
  # Bump to upgrade Pake. Check versions: https://www.npmjs.com/package/pake-cli
  PAKE_VERSION: "3.15.3"
  # Printed in the run log. If a build misbehaves, check this first — an older
  # revision still on the builder repo explains most "the fix didn't work".
  WORKFLOW_REVISION: "8 - per-build report surfaced in the app"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      icon: ${{ steps.icon.outputs.found }}
      iconDetail: ${{ steps.icon.outputs.detail }}
    steps:
      - id: gen
        run: |
          echo "workflow revision: ${WORKFLOW_REVISION}"
          declare -A R=( [linux]=ubuntu-latest [windows]=windows-latest [macos]=macos-latest )
          inc=""
          IFS=',' read -ra sel <<< "${{ inputs.platforms }}"
          for p in "${sel[@]}"; do
            p=$(echo "$p" | xargs)
            if [ -n "${R[$p]:-}" ]; then
              inc="${inc}{\"os\":\"$p\",\"runner\":\"${R[$p]}\"},"
            fi
          done
          echo "matrix={\"include\":[${inc%,}]}" >> "$GITHUB_OUTPUT"

      # Pake silently falls back to its own logo whenever it cannot fetch a
      # favicon, which is why packaged apps kept shipping the Pake icon. Resolve
      # one here, on the only runner guaranteed to have ImageMagick, and share
      # the result with every platform so all installers agree.
      - name: Resolve app icon
        id: icon
        shell: bash
        env:
          PAKE_ICON: ${{ inputs.icon }}
          PAKE_URL: ${{ inputs.url }}
        run: |
          set -uo pipefail
          # ImageMagick delegates SVG to rsvg-convert. Without it every SVG icon
          # fails to convert and the app quietly falls back to Pake's logo.
          if ! command -v rsvg-convert >/dev/null 2>&1; then
            sudo apt-get update -qq \
              && sudo apt-get install -y -qq librsvg2-bin \
              || echo "::warning::librsvg2-bin unavailable; SVG icons will be skipped"
          fi

          # Meta answers anything claiming to be Chrome with a 400, while other
          # hosts reject non-browsers, so the page is tried both ways.
          UA_BOT='Mozilla/5.0 (compatible; pake-cloud-builder/1.0)'
          UA='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36'
          host=$(node -e 'process.stdout.write(new URL(process.argv[1]).host)' "$PAKE_URL")
          origin=$(node -e 'const u=new URL(process.argv[1]);process.stdout.write(u.origin)' "$PAKE_URL")

          # Icons declared by the page itself, largest first.
          page_html=$(curl -fsSL --max-time 20 -A "$UA_BOT" "$PAKE_URL" 2>/dev/null)
          [ -n "$page_html" ] || page_html=$(curl -fsSL --max-time 20 -A "$UA" "$PAKE_URL" 2>/dev/null)
          page_icons=$(printf '%s' "$page_html" | node -e '
            let html = "";
            process.stdin.on("data", (c) => (html += c)).on("end", () => {
              const base = process.argv[1];
              const found = [];
              for (const tag of html.match(/<link\b[^>]*>/gi) || []) {
                const rel = (tag.match(/rel=["\047]([^"\047]+)["\047]/i) || [])[1];
                const href = (tag.match(/href=["\047]([^"\047]+)["\047]/i) || [])[1];
                if (!rel || !href) continue;
                const tokens = rel.toLowerCase().split(/\s+/);
                if (!tokens.includes("icon") && !tokens.includes("apple-touch-icon")) continue;
                const size = tag.match(/sizes=["\047](\d+)x\d+["\047]/i);
                found.push({ href, area: size ? Number(size[1]) : 0 });
              }
              found.sort((a, b) => b.area - a.area);
              for (const f of found) { try { console.log(new URL(f.href, base).href); } catch {} }
            });
          ' "$PAKE_URL" || true)

          # Built line by line: a multi-line shell string would need column-0
          # continuation lines, which would terminate this YAML block scalar.
          : > candidates.txt
          [ -n "$PAKE_ICON" ] && printf '%s\n' "$PAKE_ICON" >> candidates.txt
          [ -n "$page_icons" ] && printf '%s\n' "$page_icons" >> candidates.txt
          printf '%s\n' "$origin/apple-touch-icon.png" >> candidates.txt
          printf '%s\n' "$origin/favicon.ico" >> candidates.txt
          printf '%s\n' "https://icons.duckduckgo.com/ip3/${host}.ico" >> candidates.txt
          printf '%s\n' "https://www.google.com/s2/favicons?domain=${host}&sz=256" >> candidates.txt

          resolved=""
          while IFS= read -r candidate; do
            [ -n "$candidate" ] || continue
            curl -fsSL --max-time 20 -A "$UA" -e "$PAKE_URL" "$candidate" -o raw.bin 2>/dev/null || continue
            [ -s raw.bin ] || continue
            # ImageMagick reads ico/png/jpg/webp/gif/bmp/avif/svg. -density only
            # affects vector input and gives SVGs a usable raster size.
            # The content is scaled to fill 448 rather than shrink-only: a 64px
            # favicon left at native size would sit tiny inside a 512 canvas.
            if convert -background none -density 384 "raw.bin[0]" \
                 -resize 448x448 -gravity center -extent 512x512 PNG32:icon.png 2>/dev/null; then
              px=$(identify -format '%w' "raw.bin[0]" 2>/dev/null || echo 0)
              if [ "${px:-0}" -ge 32 ]; then resolved="$candidate"; break; fi
            fi
          done < candidates.txt

          if [ -n "$resolved" ]; then
            echo "resolved app icon from: $resolved"
            src_px=$(identify -format '%w' "raw.bin[0]" 2>/dev/null || echo 0)
            [ "${src_px:-0}" -lt 128 ] && echo "::warning::source icon is only ${src_px}px wide; it will look soft at desktop sizes"

            # Full-bleed square logos sit badly beside the padded, rounded icons
            # a desktop normally shows. Inset and round those; anything that
            # already carries transparency is deliberately shaped, so leave it.
            # Must be measured on the SOURCE: icon.png already carries the
            # transparent padding added by -extent, so it always reads as
            # non-opaque and this branch would never run.
            opaque=$(identify -format '%[opaque]' "raw.bin[0]" 2>/dev/null || echo unknown)
            if [ "$opaque" = "true" ] || [ "$opaque" = "True" ]; then
              if cp icon.png _base.png \
                 && convert -size 512x512 xc:black -fill white \
                      -draw "roundrectangle 32,32 479,479 96,96" -alpha off _mask.png 2>/dev/null \
                 && convert _base.png _mask.png -alpha off -compose CopyOpacity \
                      -composite PNG32:_out.png 2>/dev/null; then
                mv _out.png icon.png
                echo "inset and rounded a full-bleed icon"
              fi
              rm -f _base.png _mask.png
            else
              echo "icon already has transparency - left as-is"
            fi
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "detail=$(identify -format '%wx%h' icon.png 2>/dev/null || echo unknown) from ${resolved}" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::no usable icon found for $host - the app will ship Pake's default logo"
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "detail=none resolved - Pake will use its own logo" >> "$GITHUB_OUTPUT"
          fi

      - name: Share resolved icon
        if: steps.icon.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: resolved-icon
          path: icon.png
          retention-days: 1

  build:
    needs: setup
    # Explicit name so the job is "build (linux)" rather than GitHub's default
    # "build (linux, ubuntu-latest)" — the control plane reads the platform
    # back out of this string to track per-platform progress.
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux is the only platform needing extra system libraries; Windows
      # (MSVC + WebView2) and macOS (Xcode CLT) come ready on their runners.
      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libssl-dev libxdo-dev file rpm

      # For a universal macOS .dmg (Intel + Apple Silicon) instead of the
      # runner-native arm64 build, uncomment this step and add `--targets
      # universal` to the args below. Doubles build time.
      # - name: Add macOS universal targets
      #   if: matrix.os == 'macos'
      #   run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Pake CLI
        shell: bash
        run: npm install -g "pake-cli@${PAKE_VERSION}"

      # Pake has no --description option: its config schema declares
      # additionalProperties:false with no description field, and its
      # tauri.conf.json carries no bundle description either. tauri-bundler
      # therefore falls back to the Rust crate description, which is why every
      # packaged app has been advertising Pake's own tagline. Rewriting that one
      # line before the build fixes deb, rpm, AppImage, msi and dmg together.
      - name: Set app description
        shell: bash
        env:
          PAKE_DESC: ${{ inputs.description }}
          PAKE_NAME: ${{ inputs.name }}
        run: |
          set -uo pipefail
          # With no description supplied the app name still beats advertising
          # Pake's tagline in every software centre.
          if [ -n "$PAKE_DESC" ]; then
            echo "description received (${#PAKE_DESC} chars): $PAKE_DESC"
          else
            echo "::warning::no description was sent by the app; falling back to the app name"
          fi
          desc="${PAKE_DESC:-$PAKE_NAME}"
          manifest="$(npm root -g)/pake-cli/src-tauri/Cargo.toml"
          if [ ! -f "$manifest" ]; then
            echo "::warning::$manifest not found; keeping Pake's own description"
            exit 0
          fi
          node -e '
            const fs = require("fs");
            const [file, desc] = process.argv.slice(1);
            const before = fs.readFileSync(file, "utf8");
            const after = before.replace(/^description\s*=\s*".*"$/m, "description = " + JSON.stringify(desc));
            if (after === before) { console.log("::warning::no description line in Cargo.toml"); }
            else { fs.writeFileSync(file, after); console.log("app description set to: " + desc); }
          ' "$manifest" "$desc"

      - name: Get resolved icon
        if: needs.setup.outputs.icon == 'true'
        uses: actions/download-artifact@v4
        with:
          name: resolved-icon

      - name: Locate icon
        if: needs.setup.outputs.icon == 'true'
        shell: bash
        run: |
          set -uo pipefail
          if [ -f icon.png ]; then
            echo "PAKE_ICON_FILE=$(pwd)/icon.png" >> "$GITHUB_ENV"
            echo "using shared icon: $(pwd)/icon.png"
          else
            echo "::warning::resolved icon missing on this runner; Pake will use its fallback"
          fi

      - name: Build
        shell: bash
        env:
          PAKE_URL: ${{ inputs.url }}
          PAKE_NAME: ${{ inputs.name }}
          PAKE_DESC: ${{ inputs.description }}
          PAKE_ICON: ${{ inputs.icon }}
          PAKE_WIDTH: ${{ inputs.width }}
          PAKE_HEIGHT: ${{ inputs.height }}
          APPIMAGE_EXTRACT_AND_RUN: "1"   # build AppImage without FUSE on the runner
          NO_STRIP: "1"
        run: |
          set -euo pipefail
          mkdir -p dist

          args=(--name "$PAKE_NAME" --width "$PAKE_WIDTH" --height "$PAKE_HEIGHT")
          # Set by the icon step only when the download produced a real image.
          if [ -n "${PAKE_ICON_FILE:-}" ]; then
            args+=(--icon "$PAKE_ICON_FILE")
          fi
          # Linux is the only platform where --targets selects FORMATS. The CLI
          # keeps going if one format fails, so .deb/.rpm still ship even if the
          # AppImage step breaks.
          if [ "${{ matrix.os }}" = "linux" ]; then
            args+=(--targets deb,rpm,appimage)
          fi

          pake "$PAKE_URL" "${args[@]}"

          find . -maxdepth 1 -type f \( \
            -iname '*.deb' -o -iname '*.rpm' -o -iname '*.AppImage' \
            -o -iname '*.msi' -o -iname '*.exe' -o -iname '*.dmg' \
          \) -exec mv {} dist/ \;

          echo "Produced:"; ls -la dist/

      # Pake injects its own com.pake.<name>.desktop into both the deb and the
      # rpm, but only strips Tauri's auto-generated duplicate on the deb path.
      # The rpm therefore ships two identical launcher entries. Repack it.
      - name: De-duplicate Linux rpm launcher entry
        if: matrix.os == 'linux'
        shell: bash
        continue-on-error: true
        env:
          PAKE_DESC: ${{ inputs.description }}
          PAKE_NAME: ${{ inputs.name }}
        run: |
          set -uo pipefail
          shopt -s nullglob
          rpms=(dist/*.rpm)
          [ ${#rpms[@]} -gt 0 ] || { echo "no rpm built, nothing to do"; exit 0; }
          sudo apt-get update -qq && sudo apt-get install -y -qq rpm cpio

          for rpm_in in "${rpms[@]}"; do
            work=$(mktemp -d); root="$work/root"; mkdir -p "$root"
            name=$(rpm -qp --qf '%{NAME}'    "$rpm_in" 2>/dev/null)
            ver=$( rpm -qp --qf '%{VERSION}' "$rpm_in" 2>/dev/null)
            rel=$( rpm -qp --qf '%{RELEASE}' "$rpm_in" 2>/dev/null)
            arch=$(rpm -qp --qf '%{ARCH}'    "$rpm_in" 2>/dev/null)
            lic=$( rpm -qp --qf '%{LICENSE}' "$rpm_in" 2>/dev/null)
            desc="${PAKE_DESC:-${PAKE_NAME:-$(rpm -qp --qf '%{SUMMARY}' "$rpm_in" 2>/dev/null)}}"
            if [ -z "$name" ]; then
              echo "::warning::could not read $rpm_in, leaving it as built"; continue
            fi

            rpm2cpio "$rpm_in" | (cd "$root" && cpio -idm --quiet) || {
              echo "::warning::could not extract $rpm_in, leaving it as built"; continue; }

            echo "launcher entries before:"
            ls -1 "$root"/usr/share/applications/ 2>/dev/null | sed 's/^/  /' || echo "  (none)"

            # Keep exactly one launcher entry, whatever the files are called.
            # Pake ships com.pake.<name>.desktop and Tauri adds its own; only the
            # deb path strips the duplicate upstream. Preferring com.pake.* keeps
            # the richer entry (Categories, MimeType) but any single one will do.
            shopt -s nullglob
            entries=("$root"/usr/share/applications/*.desktop)
            keep=""
            for entry in "${entries[@]}"; do
              case "$(basename "$entry")" in com.pake.*) keep="$entry"; break;; esac
            done
            [ -n "$keep" ] || keep="${entries[0]:-}"

            if [ ${#entries[@]} -gt 1 ] && [ -n "$keep" ]; then
              for entry in "${entries[@]}"; do
                [ "$entry" = "$keep" ] && continue
                rm -f "$entry" && echo "removed duplicate launcher entry: $(basename "$entry")"
              done
            elif [ ${#entries[@]} -le 1 ]; then
              echo "only one launcher entry present - nothing to de-duplicate"
            fi

            if [ -n "$keep" ]; then
              if grep -q '^Comment=' "$keep"; then
                sed -i "s|^Comment=.*|Comment=${desc}|" "$keep"
              else
                printf 'Comment=%s\n' "$desc" >> "$keep"
              fi
              # Provenance: `grep X-Pake-Builder` on an installed app says which
              # pipeline produced it, so a stale installer is obvious.
              sed -i '/^X-Pake-Builder=/d' "$keep"
              printf 'X-Pake-Builder=%s\n' "$WORKFLOW_REVISION" >> "$keep"
            fi

            spec="$work/app.spec"
            {
              echo "%global debug_package %{nil}"
              echo "%define _build_id_links none"
              echo "Name: $name"; echo "Version: $ver"; echo "Release: $rel"
              echo "Summary: $desc"; echo "License: ${lic:-unknown}"
              echo "Packager: pake-cloud-builder (${WORKFLOW_REVISION})"
              echo "BuildArch: $arch"
              echo "%description"; echo "$desc"
              echo "%files"
              find "$root" -mindepth 1 \( -type f -o -type l \) -printf '/%P\n' | sed 's/[][*?%]/\\&/g'
            } > "$spec"

            if rpmbuild -bb --define "_topdir $work/rpmbuild" --buildroot "$root" "$spec" > "$work/log" 2>&1; then
              rebuilt=$(find "$work/rpmbuild/RPMS" -name '*.rpm' | head -1)
              if [ -n "$rebuilt" ]; then
                mv -f "$rebuilt" "$rpm_in"
                echo "repacked $(basename "$rpm_in") - launcher entries now: $(rpm -qlp "$rpm_in" 2>/dev/null | grep -c '\.desktop$')"
              else
                echo "::warning::rpmbuild produced no package for $rpm_in; shipping it as built"
              fi
            else
              echo "::warning::rpmbuild failed for $rpm_in, shipping it as built"
              tail -8 "$work/log"
            fi
            rm -rf "$work"
          done

      # Shipped inside the artifact so the app can state, in its own build log,
      # exactly what came out. Without this neither of us can tell which
      # revision produced a given installer.
      - name: Write build report
        shell: bash
        env:
          PAKE_DESC: ${{ inputs.description }}
          PAKE_NAME: ${{ inputs.name }}
          ICON_DETAIL: ${{ needs.setup.outputs.iconDetail }}
        run: |
          set -uo pipefail
          shopt -s nullglob
          desc="${PAKE_DESC:-$PAKE_NAME}"
          {
            echo "revision: ${WORKFLOW_REVISION}"
            if [ -n "$PAKE_DESC" ]; then
              echo "description: sent by the app (${#PAKE_DESC} chars)"
            else
              echo "description: NOT SENT - fell back to the app name \"${PAKE_NAME}\""
            fi
            echo "icon: ${ICON_DETAIL:-unknown}"
            for pkg in dist/*.rpm; do
              echo "launchers in $(basename "$pkg"): $(rpm -qlp "$pkg" 2>/dev/null | grep -c '\.desktop$')"
            done
            for pkg in dist/*.deb; do
              echo "launchers in $(basename "$pkg"): $(dpkg-deb -c "$pkg" 2>/dev/null | grep -c '\.desktop$')"
            done
          } > dist/build-report.txt
          cat dist/build-report.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error
          retention-days: 7
