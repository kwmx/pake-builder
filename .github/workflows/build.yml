name: Build Pake App
run-name: "build ${{ inputs.build_id }}"

# This workflow lives in a PUBLIC "builder" repo. The Pake Cloud Builder web app
# triggers it over the REST API and reads back the artifacts:
#   POST /repos/{owner}/{repo}/actions/workflows/build.yml/dispatches
#   body: { "ref": "main", "inputs": { url, name, icon, width, height, platforms, build_id } }
# The matrix runs only the OSes listed in `platforms`. `build_id` is echoed into
# run-name so the caller can correlate the dispatch with its run id.
#
# Every platform drives the `pake-cli` npm package directly rather than the
# tw93/Pake action: one mechanism, one version to pin, and no reliance on action
# tags (Pake publishes only full versions like V3.15.1 — there is no moving v3).
#
# Formats: Linux -> .deb + .rpm + .AppImage   Windows -> .msi   macOS -> .dmg
# On Windows/macOS the CLI's --targets flag selects ARCHITECTURE, not format,
# so it is omitted there and the default (host arch) is used.

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Target URL to package"
        required: true
      name:
        description: "Application name"
        required: true
      description:
        description: "App description read from the target page"
        required: false
        default: ""
      icon:
        description: "Custom icon URL (png/ico/icns)"
        required: false
        default: ""
      width:
        description: "Window width"
        required: false
        default: "1200"
      height:
        description: "Window height"
        required: false
        default: "780"
      platforms:
        description: "Comma list: linux,windows,macos"
        required: false
        default: "linux,windows,macos"
      build_id:
        description: "Correlation id set by the web app"
        required: true

env:
  # Bump to upgrade Pake. Check versions: https://www.npmjs.com/package/pake-cli
  PAKE_VERSION: "3.15.3"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          declare -A R=( [linux]=ubuntu-latest [windows]=windows-latest [macos]=macos-latest )
          inc=""
          IFS=',' read -ra sel <<< "${{ inputs.platforms }}"
          for p in "${sel[@]}"; do
            p=$(echo "$p" | xargs)
            if [ -n "${R[$p]:-}" ]; then
              inc="${inc}{\"os\":\"$p\",\"runner\":\"${R[$p]}\"},"
            fi
          done
          echo "matrix={\"include\":[${inc%,}]}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    # Explicit name so the job is "build (linux)" rather than GitHub's default
    # "build (linux, ubuntu-latest)" — the control plane reads the platform
    # back out of this string to track per-platform progress.
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux is the only platform needing extra system libraries; Windows
      # (MSVC + WebView2) and macOS (Xcode CLT) come ready on their runners.
      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libssl-dev libxdo-dev file rpm

      # For a universal macOS .dmg (Intel + Apple Silicon) instead of the
      # runner-native arm64 build, uncomment this step and add `--targets
      # universal` to the args below. Doubles build time.
      # - name: Add macOS universal targets
      #   if: matrix.os == 'macos'
      #   run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Pake CLI
        shell: bash
        run: npm install -g "pake-cli@${PAKE_VERSION}"

      # Pake has no --description option: its config schema declares
      # additionalProperties:false with no description field, and its
      # tauri.conf.json carries no bundle description either. tauri-bundler
      # therefore falls back to the Rust crate description, which is why every
      # packaged app has been advertising Pake's own tagline. Rewriting that one
      # line before the build fixes deb, rpm, AppImage, msi and dmg together.
      - name: Set app description
        if: inputs.description != ''
        shell: bash
        env:
          PAKE_DESC: ${{ inputs.description }}
        run: |
          set -uo pipefail
          manifest="$(npm root -g)/pake-cli/src-tauri/Cargo.toml"
          if [ ! -f "$manifest" ]; then
            echo "::warning::$manifest not found; keeping Pake's own description"
            exit 0
          fi
          node -e '
            const fs = require("fs");
            const [file, desc] = process.argv.slice(1);
            const before = fs.readFileSync(file, "utf8");
            const after = before.replace(/^description\s*=\s*".*"$/m, "description = " + JSON.stringify(desc));
            if (after === before) { console.log("::warning::no description line in Cargo.toml"); }
            else { fs.writeFileSync(file, after); console.log("app description set to: " + desc); }
          ' "$manifest" "$PAKE_DESC"

      # Pake silently falls back to its own icon when a favicon cannot be
      # fetched, which is how apps ended up shipping the Pake logo. Resolve the
      # icon here so a failure is visible in the log instead.
      - name: Fetch app icon
        if: inputs.icon != ''
        shell: bash
        env:
          PAKE_ICON: ${{ inputs.icon }}
        run: |
          set -uo pipefail
          if ! curl -fsSL --max-time 30 "$PAKE_ICON" -o icon.bin; then
            echo "::warning::could not download $PAKE_ICON - falling back to the site favicon"
            exit 0
          fi
          ext=$(node -e '
            const b = require("fs").readFileSync("icon.bin");
            const is = (...bytes) => bytes.every((v, i) => b[i] === v);
            if (is(0x89,0x50,0x4e,0x47)) process.stdout.write("png");
            else if (is(0x00,0x00,0x01,0x00)) process.stdout.write("ico");
            else if (b.slice(0,4).toString() === "icns") process.stdout.write("icns");
            else process.stdout.write("");
          ')
          if [ -z "$ext" ]; then
            echo "::warning::$PAKE_ICON is not a PNG, ICO or ICNS - falling back to the site favicon"
            exit 0
          fi
          mv icon.bin "app-icon.$ext"
          echo "PAKE_ICON_FILE=$(pwd)/app-icon.$ext" >> "$GITHUB_ENV"
          echo "using icon: app-icon.$ext"

      - name: Build
        shell: bash
        env:
          PAKE_URL: ${{ inputs.url }}
          PAKE_NAME: ${{ inputs.name }}
          PAKE_DESC: ${{ inputs.description }}
          PAKE_ICON: ${{ inputs.icon }}
          PAKE_WIDTH: ${{ inputs.width }}
          PAKE_HEIGHT: ${{ inputs.height }}
          APPIMAGE_EXTRACT_AND_RUN: "1"   # build AppImage without FUSE on the runner
          NO_STRIP: "1"
        run: |
          set -euo pipefail
          mkdir -p dist

          args=(--name "$PAKE_NAME" --width "$PAKE_WIDTH" --height "$PAKE_HEIGHT")
          # Set by the icon step only when the download produced a real image.
          if [ -n "${PAKE_ICON_FILE:-}" ]; then
            args+=(--icon "$PAKE_ICON_FILE")
          fi
          # Linux is the only platform where --targets selects FORMATS. The CLI
          # keeps going if one format fails, so .deb/.rpm still ship even if the
          # AppImage step breaks.
          if [ "${{ matrix.os }}" = "linux" ]; then
            args+=(--targets deb,rpm,appimage)
          fi

          pake "$PAKE_URL" "${args[@]}"

          find . -maxdepth 1 -type f \( \
            -iname '*.deb' -o -iname '*.rpm' -o -iname '*.AppImage' \
            -o -iname '*.msi' -o -iname '*.exe' -o -iname '*.dmg' \
          \) -exec mv {} dist/ \;

          echo "Produced:"; ls -la dist/

      # Pake injects its own com.pake.<name>.desktop into both the deb and the
      # rpm, but only strips Tauri's auto-generated duplicate on the deb path.
      # The rpm therefore ships two identical launcher entries. Repack it.
      - name: De-duplicate Linux rpm launcher entry
        if: matrix.os == 'linux'
        shell: bash
        continue-on-error: true
        env:
          PAKE_DESC: ${{ inputs.description }}
        run: |
          set -uo pipefail
          shopt -s nullglob
          rpms=(dist/*.rpm)
          [ ${#rpms[@]} -gt 0 ] || { echo "no rpm built, nothing to do"; exit 0; }
          sudo apt-get update -qq && sudo apt-get install -y -qq rpm cpio

          for rpm_in in "${rpms[@]}"; do
            work=$(mktemp -d); root="$work/root"; mkdir -p "$root"
            name=$(rpm -qp --qf '%{NAME}'    "$rpm_in" 2>/dev/null)
            ver=$( rpm -qp --qf '%{VERSION}' "$rpm_in" 2>/dev/null)
            rel=$( rpm -qp --qf '%{RELEASE}' "$rpm_in" 2>/dev/null)
            arch=$(rpm -qp --qf '%{ARCH}'    "$rpm_in" 2>/dev/null)
            lic=$( rpm -qp --qf '%{LICENSE}' "$rpm_in" 2>/dev/null)
            desc="${PAKE_DESC:-$(rpm -qp --qf '%{SUMMARY}' "$rpm_in" 2>/dev/null)}"
            if [ -z "$name" ]; then
              echo "::warning::could not read $rpm_in, leaving it as built"; continue
            fi

            rpm2cpio "$rpm_in" | (cd "$root" && cpio -idm --quiet) || {
              echo "::warning::could not extract $rpm_in, leaving it as built"; continue; }

            dup="$root/usr/share/applications/${name}.desktop"
            own="$root/usr/share/applications/com.pake.${name}.desktop"
            if [ -f "$dup" ] && [ -f "$own" ]; then
              rm -f "$dup"
              echo "removed duplicate launcher entry: ${name}.desktop"
            else
              echo "no duplicate found in $(basename "$rpm_in") - upstream may have fixed it"
            fi

            for entry in "$root"/usr/share/applications/*.desktop; do
              [ -f "$entry" ] || continue
              if grep -q '^Comment=' "$entry"; then
                sed -i "s|^Comment=.*|Comment=${desc}|" "$entry"
              else
                printf 'Comment=%s\n' "$desc" >> "$entry"
              fi
            done

            spec="$work/app.spec"
            {
              echo "%global debug_package %{nil}"
              echo "%define _build_id_links none"
              echo "Name: $name"; echo "Version: $ver"; echo "Release: $rel"
              echo "Summary: $desc"; echo "License: ${lic:-unknown}"
              echo "BuildArch: $arch"
              echo "%description"; echo "$desc"
              echo "%files"
              find "$root" -mindepth 1 \( -type f -o -type l \) -printf '/%P\n' | sed 's/[][*?%]/\\&/g'
            } > "$spec"

            if rpmbuild -bb --define "_topdir $work/rpmbuild" --buildroot "$root" "$spec" > "$work/log" 2>&1; then
              rebuilt=$(find "$work/rpmbuild/RPMS" -name '*.rpm' | head -1)
              [ -n "$rebuilt" ] && mv -f "$rebuilt" "$rpm_in" && echo "repacked $(basename "$rpm_in")"
            else
              echo "::warning::rpmbuild failed for $rpm_in, shipping it as built"
              tail -8 "$work/log"
            fi
            rm -rf "$work"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error
          retention-days: 7
